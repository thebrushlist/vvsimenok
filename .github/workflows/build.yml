name: Build & Deploy
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate site
        env:
          STRIPE_API_KEY: ${{ secrets.STRIPE_API_KEY }}
        run: python3 generate.py
      - name: Prepare artifact
        run: |
          mkdir -p _site
          cp index.html _site/
          cp CNAME _site/
          cp -r paintings _site/paintings 2>/dev/null || true
          cp -r drawings _site/drawings 2>/dev/null || true
          cp -r prints _site/prints 2>/dev/null || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
